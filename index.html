<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cowles Rd, Mosman | Private Offer Suite</title>
    
    <!-- 1. EXTERNAL RESOURCES -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* 2. CORE DESIGN SYSTEM */
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #fcfcfc; 
            color: #1a1a1a; 
            overflow-x: hidden; 
        }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }
        
        /* 3. SCROLL SNAP LOGIC (3 FULL-SCREEN SCENES) */
        .snap-container { 
            scroll-snap-type: y mandatory; 
            height: 100vh; 
            overflow-y: scroll; 
            scrollbar-width: none; 
        }
        .snap-container::-webkit-scrollbar { display: none; }
        
        section { 
            scroll-snap-align: start; 
            min-height: 100vh; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        /* 4. PREMIUM UI ELEMENTS */
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .gold-accent { color: #C5A059; }
        .btn-gold { 
            background: linear-gradient(135deg, #C5A059 0%, #E2C285 100%); 
            transition: all 0.4s ease; 
        }

        /* 5. JUMP LINKS STYLE (AS REQUESTED) */
        .nav-link { 
            color: #C5A059; /* Bright Gold (Normal) */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 2px rgba(0,0,0,0.3)); 
        }

        .nav-link:hover { 
            color: #8a6d3b; /* Darker Bronze (Hover) */
            transform: scale(1.1); 
        }

        .nav-link.active { 
            color: #ffffff !important; /* Pure White (Active) */
            filter: drop-shadow(0 0 10px #C5A059); /* Signature Gold Glow */
            transform: scale(1.3); 
        }

        /* 6. AGENT PROFILE STYLING */
        .image-frame-container { position: relative; width: 100%; max-width: 300px; }
        @media (min-width: 768px) { .image-frame-container { max-width: 400px; } }
        
        .gold-border-back {
            position: absolute; top: 15px; left: 15px; width: 100%; height: 100%;
            border: 1px solid #C5A059; z-index: 0;
        }
        .agent-image {
            position: relative; z-index: 10; width: 100%; height: auto;
            display: block; filter: grayscale(100%); transition: filter 0.5s ease;
        }
        .agent-image:hover { filter: grayscale(0%); }

        /* 7. ANIMATIONS */
        @keyframes pulse-custom {
            0% { transform: translate(-50%, 0); opacity: 0.3; }
            50% { transform: translate(-50%, 10px); opacity: 1; }
            100% { transform: translate(-50%, 0); opacity: 0.3; }
        }
        .animate-scroll { animation: pulse-custom 3s infinite; }
    </style>
</head>
<body>

    <!-- NAV JUMP LINKS -->
    <nav class="fixed right-4 md:right-8 top-1/2 -translate-y-1/2 z-50 flex flex-col gap-10">
        <a href="#scene1" class="nav-link active">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
        </a>
        <a href="#scene2" class="nav-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
        </a>
        <a href="#scene3" class="nav-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
        </a>
    </nav>

    <div class="snap-container">
        <!-- SCENE 1 & 2 Tetap Sama, Langsung ke SCENE 3 -->
        <section id="scene1" class="px-4 text-center overflow-hidden">
            <div class="absolute inset-0 z-0">
                <video id="heroVideo" autoplay muted loop playsinline poster="hero-cover.jpg" class="w-full h-full object-cover"></video>
            </div>
            <div class="absolute inset-0 bg-black/40 z-10"></div>
            <div class="relative z-20 text-white">
                <h1 class="text-4xl md:text-7xl mb-4 leading-tight">Secure Your Future at <br><span class="italic">Cowles Rd, Mosman</span></h1>
                <p class="text-xs md:text-xl font-light tracking-[0.3em] uppercase opacity-90">A Private Digital Offer Suite</p>
            </div>
            <div class="absolute bottom-10 left-1/2 -translate-x-1/2 animate-scroll z-20 text-white text-center">
                <p class="text-[10px] uppercase tracking-widest mb-2 opacity-60">Scroll</p>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
            </div>
        </section>

        <section id="scene2" class="bg-white py-12 px-6 overflow-y-auto md:overflow-hidden">
            <div class="container mx-auto grid md:grid-cols-2 gap-12 items-center max-w-6xl mt-8">
                <div class="flex justify-center md:justify-end order-2 md:order-1">
                    <div class="image-frame-container">
                        <div class="gold-border-back"></div>
                        <img src="https://images.pexels.com/photos/3778680/pexels-photo-3778680.jpeg?auto=compress&cs=tinysrgb&w=800" alt="Agent" class="agent-image shadow-2xl">
                    </div>
                </div>
                <div class="text-center md:text-left order-1 md:order-2">
                    <h2 class="text-4xl md:text-6xl mb-6">Expert Guidance.</h2>
                    <p class="text-xl gold-accent font-semibold mb-1">John Smith</p>
                    <p class="text-gray-400 uppercase tracking-widest text-[10px] md:text-xs mb-8 font-bold">Elite Performer at International Real Estate Agency</p>
                    <div class="h-px w-20 bg-[#C5A059] mb-8 mx-auto md:mx-0"></div>
                    <blockquote class="text-sm md:text-lg italic text-gray-600 max-w-md mx-auto md:mx-0 leading-relaxed">
                        "Real estate is not just about transactions; it's about matching a legacy with its next custodian."
                    </blockquote>
                </div>
            </div>
        </section>

        <!-- SCENE 3: FORM -->
        <section id="scene3" class="bg-[#fcfcfc] py-10 px-4 overflow-y-auto">
            <div class="max-w-4xl w-full mx-auto">
                <form id="offerForm" class="glass-panel p-6 md:p-12 shadow-2xl rounded-sm">
                    <!-- GANTI VALUE INI DENGAN EMAIL AGEN TUJUAN -->
                    <input type="hidden" name="agent_email" value="tamijomisdiati@gmail.com">
                    <input type="hidden" name="property_address" value="Cowles Rd, Mosman">

                    <h2 class="text-4xl md:text-6xl mb-10 text-center serif tracking-tight text-black">Offer Details</h2>
                    
                    <div class="grid md:grid-cols-2 gap-8">
                        <div class="space-y-6">
                            <div>
                                <label class="block text-[10px] uppercase font-bold text-gray-400 mb-2">Listing</label>
                                <input type="text" value="Cowles Rd, Mosman" readonly class="w-full border-b border-gray-200 py-1 bg-transparent outline-none font-semibold text-gray-600">
                            </div>
                            <div>
                                <label class="block text-[10px] uppercase font-bold mb-2">Buyer Full Name(s)</label>
                                <input type="text" name="buyer_names" required class="w-full border-b border-gray-300 py-1 focus:border-[#C5A059] outline-none">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] uppercase font-bold mb-2">Email</label>
                                    <input type="email" name="email" required class="w-full border-b border-gray-300 py-1 focus:border-[#C5A059] outline-none">
                                </div>
                                <div>
                                    <label class="block text-[10px] uppercase font-bold mb-2">Phone</label>
                                    <input type="tel" id="phone" name="phone" required class="w-full border-b border-gray-300 py-1 focus:border-[#C5A059] outline-none">
                                </div>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] uppercase font-bold mb-2">Offer Price ($)</label>
                                    <input type="text" id="offer_price" name="offer_price" required class="w-full border-b border-gray-300 py-1 focus:border-[#C5A059] outline-none">
                                </div>
                                <div>
                                    <label class="block text-[10px] uppercase font-bold mb-2">Deposit</label>
                                    <input type="text" id="deposit" name="deposit" placeholder="e.g. 10% or 50,000" class="w-full border-b border-gray-300 py-1 focus:border-[#C5A059] outline-none">
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] uppercase font-bold mb-2">Settlement Period</label>
                                <select name="settlement" class="w-full border-b border-gray-300 py-1 bg-transparent outline-none text-sm">
                                    <option value="30 Days">30 Days</option>
                                    <option value="60 Days" selected>60 Days</option>
                                    <option value="90 Days">90 Days</option>
                                </select>
                            </div>
                            <div class="flex flex-col gap-4 pt-4">
                                <label class="flex items-center cursor-pointer text-[10px] uppercase font-bold">
                                    <div class="relative w-8 h-4 mr-3">
                                        <input type="checkbox" name="subject_to_finance" class="sr-only peer">
                                        <div class="w-full h-full bg-gray-200 rounded-full peer-checked:bg-[#C5A059] transition-colors"></div>
                                        <div class="absolute top-1 left-1 w-2 h-2 bg-white rounded-full transition-transform peer-checked:translate-x-4"></div>
                                    </div>
                                    Subject to Finance
                                </label>
                                <label class="flex items-center cursor-pointer text-[10px] uppercase font-bold">
                                    <div class="relative w-8 h-4 mr-3">
                                        <input type="checkbox" name="subject_to_inspection" class="sr-only peer">
                                        <div class="w-full h-full bg-gray-200 rounded-full peer-checked:bg-[#C5A059] transition-colors"></div>
                                        <div class="absolute top-1 left-1 w-2 h-2 bg-white rounded-full transition-transform peer-checked:translate-x-4"></div>
                                    </div>
                                    Subject to Inspection
                                </label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-8">
                        <label class="block text-[10px] uppercase font-bold text-gray-400 mb-2">Comments</label>
                        <textarea name="comments" rows="1" class="w-full border-b border-gray-200 py-1 bg-transparent outline-none focus:border-[#C5A059] resize-none text-sm"></textarea>
                    </div>

                    <div class="mt-6 text-center">
                        <div id="statusMsg" class="mb-4 text-sm font-semibold"></div>
                        <button type="submit" id="submitBtn" class="btn-gold w-full py-5 text-black font-bold text-xs uppercase tracking-[0.3em] shadow-xl transform transition active:scale-95">
                            Submit
                        </button>
                    </div>
                </form>
            </div>
        </section>
    </div>

    <script>
        // --- INPUT FORMATTING ---
        const priceInput = document.getElementById('offer_price');
        priceInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, "");
            if (val) e.target.value = new Intl.NumberFormat('en-AU').format(val);
        });

        const phoneInput = document.getElementById('phone');
        let isDeleting = false;
        phoneInput.addEventListener('keydown', (e) => { isDeleting = e.key === 'Backspace'; });
        phoneInput.addEventListener('input', (e) => {
            if (isDeleting) return;
            let num = e.target.value.replace(/\D/g, '');
            let fmt = '';
            if (num.startsWith('04')) {
                fmt = num.substring(0, 4) + (num.length > 4 ? ' ' + num.substring(4, 7) : '') + (num.length > 7 ? ' ' + num.substring(7, 10) : '');
            } else if (['02', '03', '07', '08'].includes(num.substring(0, 2))) {
                if (num.length <= 2) fmt = num;
                else if (num.length <= 6) fmt = '(' + num.substring(0, 2) + ') ' + num.substring(2);
                else fmt = '(' + num.substring(0, 2) + ') ' + num.substring(2, 6) + ' ' + num.substring(6, 10);
            } else { fmt = num; }
            e.target.value = fmt;
        });

        // --- JUMPLINK ACTIVE ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    document.querySelectorAll('.nav-link').forEach(link => {
                        link.classList.toggle('active', link.getAttribute('href') === `#${entry.target.id}`);
                    });
                }
            });
        }, { threshold: 0.6 });
        document.querySelectorAll('section').forEach(s => observer.observe(s));

        // --- VIDEO PLAYBACK ---
        function playHeroVideo() {
            const v = document.getElementById('heroVideo');
            if (!v) return;
            v.src = (window.innerWidth >= 768) ? 'hero-desktop.mp4' : 'hero-mobile.mp4';
            v.playbackRate = 0.8;
            v.play().catch(() => {
                document.addEventListener('touchstart', () => v.play(), {once: true});
            });
        }
        window.addEventListener('DOMContentLoaded', playHeroVideo);
        // --- DEPOSIT INPUT FORMATTING--
        const depositInput = document.getElementById('deposit');

        depositInput.addEventListener('input', (e) => {
            let val = e.target.value;

            // Jika user mengetik simbol % atau huruf, biarkan saja (jangan diformat ribuan)
            if (/[a-zA-Z%]/.test(val)) {
                return; 
            }

            // Jika user hanya mengetik angka, format jadi ribuan otomatis
            let num = val.replace(/\D/g, ""); // Ambil angkanya saja
            if (num) {
                e.target.value = new Intl.NumberFormat('en-AU').format(num);
            }
        });
        // --- FORM SUBMISSION ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw6bsPQv5u64CeMfkTzseVG7Ya8PBHwqqnnyqqsarFrVGr_cNnds-8CQVnkoCZrCkZ_/exec';
        const form = document.getElementById('offerForm');
        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('statusMsg');
            btn.disabled = true;
            status.innerHTML = "SENDING OFFER...";
            status.className = "mb-4 text-sm font-semibold text-gray-400 animate-pulse";
            
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(() => {
                    status.innerHTML = "✅ SUCCESS! OFFER SENT TO AGENT.";
                    status.className = "mb-4 text-sm font-semibold text-green-600";
                    form.reset();
                    btn.disabled = false;
                })
                .catch(() => {
                    status.innerHTML = "❌ ERROR. PLEASE TRY AGAIN.";
                    status.className = "mb-4 text-sm font-semibold text-red-600";
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
